<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BB VIP 1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
    #player-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    #player-container iframe { width: 100%; height: 100%; border: none; }
    #offline-message {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #ccc;
      text-align: center;
      padding: 20px;
    }
    #offline-message .icon { font-size: 64px; margin-bottom: 20px; opacity: 0.6; }
    #offline-message h2 { font-size: 24px; color: #fff; margin-bottom: 10px; }
    #offline-message p { font-size: 16px; color: #999; }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #ccc;
    }
    #loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333; border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="player-container">
    <div id="loading">
      <div class="spinner"></div>
      <p>Fetching live stream...</p>
    </div>
    <div id="offline-message">
      <div class="icon">📡</div>
      <h2>Stream is temporarily unavailable.</h2>
      <p>BB VIP 1 is not currently broadcasting live.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.18/dist/hls.min.js"></script>
  <script>
    function createIframe(url, container) {
      var iframe = document.createElement('iframe');
      iframe.src = url;
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
      iframe.allowFullscreen = true;
      container.appendChild(iframe);
    }

    function createHlsPlayer(url, container) {
      var video = document.createElement('video');
      video.controls = true;
      video.autoplay = true;
      video.playsInline = true;
      video.muted = false;
      video.style.width = '100%';
      video.style.height = '100%';
      video.style.background = '#000';

      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
      } else if (window.Hls && window.Hls.isSupported()) {
        var hls = new window.Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
      } else {
        return false;
      }

      container.appendChild(video);
      return true;
    }

    async function loadStream() {
      var container = document.getElementById('player-container');
      var loading = document.getElementById('loading');
      var offlineMsg = document.getElementById('offline-message');

      try {
        var resp = await fetch('/.netlify/functions/bb-vip-stream');
        var data = await resp.json();

        loading.style.display = 'none';

        if (data.found && data.embedUrls && data.embedUrls.length > 0) {
          var embedUrl = data.embedUrls[0];
          var isHls = /\.m3u8(?:$|\?)/i.test(embedUrl);

          if (isHls) {
            var didRender = createHlsPlayer(embedUrl, container);
            if (!didRender) {
              offlineMsg.style.display = 'flex';
            }
          } else {
            createIframe(embedUrl, container);
          }
        } else {
          offlineMsg.style.display = 'flex';
        }
      } catch (err) {
        loading.style.display = 'none';
        offlineMsg.style.display = 'flex';
      }
    }

    loadStream();
  </script>
</body>
</html>
