<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RTSH SAT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
    #player-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    #player-container iframe { width: 100%; height: 100%; border: none; }
    #offline-message {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #ccc;
      text-align: center;
      padding: 20px;
    }
    #offline-message .icon { font-size: 64px; margin-bottom: 20px; opacity: 0.6; }
    #offline-message h2 { font-size: 24px; color: #fff; margin-bottom: 10px; }
    #offline-message p { font-size: 16px; color: #999; }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #ccc;
    }
    #loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333; border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="player-container">
    <div id="loading">
      <div class="spinner"></div>
      <p>Checking for live stream...</p>
    </div>
    <div id="offline-message">
      <div class="icon">📡</div>
      <h2>Its offline, maybe comeback later.</h2>
      <p>RTSH SAT is not currently broadcasting live.</p>
    </div>
  </div>

  <script>
    async function checkLiveStream() {
      const container = document.getElementById('player-container');
      const loading = document.getElementById('loading');
      const offlineMsg = document.getElementById('offline-message');

      try {
        const resp = await fetch('/.netlify/functions/youtube-live?channel=@RadioTelevizioniShqiptar');
        const data = await resp.json();

        loading.style.display = 'none';

        if (data.live && data.videoIds && data.videoIds.length > 0) {
          const videoId = data.videoIds[0];
          const iframe = document.createElement('iframe');
          iframe.src = 'https://www.youtube-nocookie.com/embed/' + videoId + '?autoplay=1&rel=0';
          iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
          iframe.allowFullscreen = true;
          container.appendChild(iframe);
        } else {
          offlineMsg.style.display = 'flex';
        }
      } catch (err) {
        loading.style.display = 'none';
        offlineMsg.style.display = 'flex';
      }
    }

    checkLiveStream();
  </script>
</body>
</html>
