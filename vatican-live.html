<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vatican Media Live</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
    #player-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    #player-container iframe,
    #player-container video { width: 100%; height: 100%; border: none; background: #000; }
    #offline-message {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #ccc;
      text-align: center;
      padding: 20px;
    }
    #offline-message .icon { font-size: 64px; margin-bottom: 20px; opacity: 0.6; }
    #offline-message h2 { font-size: 24px; color: #fff; margin-bottom: 10px; }
    #offline-message p { font-size: 16px; color: #999; }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #ccc;
    }
    #loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333; border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="player-container">
    <div id="loading">
      <div class="spinner"></div>
      <p>Checking Vatican live stream...</p>
    </div>
    <div id="offline-message">
      <div class="icon">📡</div>
      <h2>Its offline, maybe comeback later.</h2>
      <p>Vatican Media is not currently broadcasting live.</p>
    </div>
  </div>

  <script>
    function getYoutubeVideoId(url) {
      if (!url || typeof url !== 'string') return '';
      var embedMatch = url.match(/youtube(?:-nocookie)?\.com\/embed\/([a-zA-Z0-9_-]{11})/i);
      if (embedMatch) return embedMatch[1];
      var watchMatch = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/i);
      if (watchMatch) return watchMatch[1];
      var shortMatch = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/i);
      if (shortMatch) return shortMatch[1];
      return '';
    }

    function showOffline() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('offline-message').style.display = 'flex';
    }

    function renderYouTube(videoId) {
      var container = document.getElementById('player-container');
      var iframe = document.createElement('iframe');
      iframe.src = 'https://www.youtube-nocookie.com/embed/' + videoId + '?autoplay=1&rel=0';
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
      iframe.allowFullscreen = true;
      container.appendChild(iframe);
    }

    function renderHls(url) {
      var container = document.getElementById('player-container');
      var video = document.createElement('video');
      video.controls = true;
      video.autoplay = true;
      video.muted = true;
      video.playsInline = true;
      container.appendChild(video);

      if (window.Hls && Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
      } else {
        showOffline();
      }
    }

    async function checkLiveStream() {
      var container = document.getElementById('player-container');
      var loading = document.getElementById('loading');

      try {
        var resp = await fetch('/.netlify/functions/vatican-live');
        var data = await resp.json();

        loading.style.display = 'none';

        if (!data.live) {
          showOffline();
          return;
        }

        if (data.sourceType === 'youtube') {
          var videoId = data.youtubeVideoId || getYoutubeVideoId(data.url || '');
          if (!videoId) {
            showOffline();
            return;
          }
          renderYouTube(videoId);
          return;
        }

        if (data.sourceType === 'hls' && data.url) {
          renderHls(data.url);
          return;
        }

        if (data.sourceType === 'dash' && data.url) {
          var iframe = document.createElement('iframe');
          iframe.src = data.url;
          iframe.allowFullscreen = true;
          container.appendChild(iframe);
          return;
        }

        showOffline();
      } catch (err) {
        showOffline();
      }
    }

    checkLiveStream();
  </script>
</body>
</html>
