<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cookiestv Sports</title>
  <style>
    :root {
      --bg: #09090f;
      --panel: #141420;
      --panel-2: #1a1a2a;
      --panel-3: #202237;
      --text: #ececf4;
      --muted: #a3a3bf;
      --accent: #22c55e;
      --border: rgba(255,255,255,0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(1000px 500px at -5% -20%, rgba(34,197,94,0.18), transparent 55%),
        radial-gradient(800px 450px at 110% 120%, rgba(34,197,94,0.12), transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .app {
      width: min(1980px, 100%);
      height: min(1120px, calc(100vh - 4px));
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: 18px;
      display: grid;
      grid-template-columns: 180px 1fr;
      overflow: hidden;
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      margin: 0 0 4px 0;
      font-size: 1.08rem;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .nav-link {
      display: inline-block;
      margin-top: 10px;
      color: #8ed0ff;
      text-decoration: none;
      font-size: 0.84rem;
    }

    .channel-list {
      padding: 10px;
      overflow: auto;
      min-height: 0;
    }

    .channel-btn {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-2);
      color: var(--text);
      padding: 12px 11px;
      margin-bottom: 8px;
      text-align: left;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.16s ease;
    }

    .channel-btn:hover { border-color: rgba(34,197,94,0.45); }
    .channel-btn.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(34,197,94,0.25) inset;
    }

    .viewer {
      display: grid;
      place-items: center;
      background: #050509;
      padding: 4px;
      overflow: hidden;
    }

    .frame-wrap {
      width: min(100%, 1820px);
      height: min(100%, 1090px);
      max-width: 100%;
      max-height: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: #000;
    }

    .browser-shell {
      height: 100%;
      display: grid;
      grid-template-rows: auto auto 1fr;
      background: #090910;
    }

    .browser-topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 10px 8px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #141526 0%, #11121f 100%);
    }

    .tab-strip {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .browser-tab {
      border: 1px solid var(--border);
      border-radius: 10px 10px 0 0;
      background: var(--panel-2);
      color: #d5d7ef;
      padding: 8px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .browser-tab.active {
      background: var(--panel-3);
      border-color: rgba(34,197,94,0.42);
      color: #f6fff9;
    }

    .browser-toolbar {
      border-bottom: 1px solid var(--border);
      padding: 8px 10px;
      background: #11121f;
    }

    .address-pill {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.78rem;
      color: #becee8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: rgba(255,255,255,0.03);
    }

    .player-stage {
      position: relative;
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto auto;
      gap: 6px;
      padding: 8px;
      background:
        radial-gradient(500px 200px at 20% 0%, rgba(34,197,94,0.14), transparent 55%),
        #07070c;
    }

    .player-meta {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 10px;
      align-items: center;
      min-height: 0;
    }

    .engine-badge {
      width: fit-content;
      font-size: 0.75rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border: 1px solid rgba(34,197,94,0.5);
      border-radius: 999px;
      padding: 5px 9px;
      color: #86efac;
      background: rgba(34,197,94,0.16);
    }

    .channel-title {
      font-size: clamp(1.05rem, 1.3vw, 1.3rem);
      margin: 0;
    }

    .channel-url {
      color: var(--muted);
      font-size: 0.78rem;
      line-break: anywhere;
      margin: 0;
      text-decoration: none;
      grid-column: 1 / -1;
    }

    .channel-url:hover {
      color: #bfdbfe;
      text-decoration: underline;
    }

    .sports-note {
      margin: 0;
      font-size: 0.76rem;
      color: #fecaca;
      display: flex;
      align-items: center;
      gap: 8px;
      grid-column: 1 / -1;
    }

    .sports-note::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #ef4444;
      box-shadow: 0 0 0 4px rgba(239,68,68,0.2);
      flex: 0 0 auto;
    }

    .status-text {
      margin: 0;
      color: #d9d9e6;
      font-size: 0.82rem;
      justify-self: end;
      text-align: right;
    }

    .status-text.error {
      color: #fca5a5;
    }

    .player-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px;
    }

    .watch-surface {
      min-height: 0;
      height: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #020204;
      position: relative;
    }

    .watch-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    .watch-hint {
      position: absolute;
      inset: 0;
      margin: 0;
      display: grid;
      place-items: center;
      font-size: 0.86rem;
      color: var(--muted);
      background: rgba(4,4,8,0.94);
      text-align: center;
      padding: 12px;
      pointer-events: none;
    }

    .watch-hint.hidden {
      display: none;
    }

    .action-btn {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px;
      color: #f8fafc;
      background: rgba(23,23,39,0.9);
      text-decoration: none;
      font-size: 0.84rem;
      transition: 0.16s ease;
      cursor: pointer;
      backdrop-filter: blur(2px);
    }

    .action-btn:hover:not(:disabled) {
      border-color: rgba(34,197,94,0.5);
      background: #1b1b2e;
    }

    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .app {
        height: auto;
        grid-template-columns: 1fr;
      }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--border); }
      .frame-wrap {
        width: min(100%, 1820px);
        height: auto;
        aspect-ratio: 1820 / 1090;
      }
      .player-meta {
        grid-template-columns: 1fr;
        gap: 5px;
      }
      .status-text {
        justify-self: start;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="header">
        <h1>Sports Channels</h1>
        <p>Chromium-style player with in-page watching.</p>
        <a class="nav-link" href="/">Back to Live TV</a>
      </div>
      <div class="channel-list" id="channelList"></div>
    </aside>

    <section class="viewer">
      <div class="frame-wrap">
        <div class="browser-shell">
          <div class="browser-topbar">
            <div class="tab-strip" id="tabStrip"></div>
            <button class="action-btn" id="newTabBtn" type="button">+ New Tab</button>
          </div>
          <div class="browser-toolbar">
            <div class="address-pill" id="addressPill">about:blank</div>
          </div>
          <div class="player-stage">
            <div class="watch-surface">
              <iframe class="watch-frame" id="streamFrame" title="Sports stream player" allow="autoplay; fullscreen; picture-in-picture" referrerpolicy="no-referrer"></iframe>
              <p class="watch-hint" id="watchHint">Choose a channel and press Watch In Player.</p>
            </div>
            <div class="player-meta">
              <div class="engine-badge" id="engineBadge">Chromium player tabs</div>
              <h2 class="channel-title" id="channelTitle">Loading channel...</h2>
              <a class="channel-url" id="channelUrl" href="#"></a>
              <p class="status-text" id="statusText"></p>
              <p class="sports-note">all of the sports channel belong to 3rd party players.</p>
            </div>
            <div class="player-controls">
              <button class="action-btn" id="watchInPlayer" type="button">Watch In Player</button>
              <button class="action-btn" id="openPlayer" type="button">Open In New Tab</button>
              <button class="action-btn" id="reloadPlayer" type="button">Reload Player</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const channels = [
      { name: "TNT Sport 1", url: "https://vivatops.store/channel1" },
      { name: "TNT Sport 2", url: "https://vivatops.store/channel2" },
      { name: "TNT Sport 3", url: "https://vivatops.store/channel3" },
      { name: "Bein Sports 1", url: "https://vivatops.store/channel5" },
      { name: "Bein Sports 2", url: "https://vivatops.store/channel6" },
      { name: "Sky Sports Football", url: "https://vivatops.store/channel7" },
      { name: "NBA League Pass", url: "https://vivatops.store/channel18" }
    ];

    const list = document.getElementById("channelList");
    const openPlayer = document.getElementById("openPlayer");
    const reloadPlayer = document.getElementById("reloadPlayer");
    const watchInPlayer = document.getElementById("watchInPlayer");
    const newTabBtn = document.getElementById("newTabBtn");
    const channelTitle = document.getElementById("channelTitle");
    const channelUrl = document.getElementById("channelUrl");
    const statusText = document.getElementById("statusText");
    const tabStrip = document.getElementById("tabStrip");
    const addressPill = document.getElementById("addressPill");
    const streamFrame = document.getElementById("streamFrame");
    const watchHint = document.getElementById("watchHint");
    const engineBadge = document.getElementById("engineBadge");

    let selectedChannel = null;
    let tabCounter = 0;
    let activeTabId = null;
    const playerTabs = [];
    const isChromium = /(?:Chrome|Chromium)\/\d+/i.test(navigator.userAgent) && !/Edg\//i.test(navigator.userAgent);

    function toEmbedProxyUrl(rawUrl) {
      return `/api/embed-proxy?url=${encodeURIComponent(rawUrl)}`;
    }

    function updateStatus(text, isError = false) {
      statusText.textContent = text;
      statusText.classList.toggle("error", isError);
    }

    function renderTabs() {
      tabStrip.innerHTML = "";
      playerTabs.forEach((tab) => {
        const tabBtn = document.createElement("button");
        tabBtn.type = "button";
        tabBtn.className = "browser-tab";
        if (tab.id === activeTabId) {
          tabBtn.classList.add("active");
        }
        tabBtn.textContent = tab.label;
        tabBtn.addEventListener("click", () => activateTab(tab.id));
        tabStrip.appendChild(tabBtn);
      });
    }

    function activateTab(tabId) {
      const tab = playerTabs.find((entry) => entry.id === tabId);
      if (!tab) return;
      activeTabId = tabId;
      selectedChannel = tab.channel;
      channelTitle.textContent = tab.channel.name;
      channelUrl.textContent = tab.channel.url;
      channelUrl.href = tab.channel.url;
      channelUrl.target = "_blank";
      addressPill.textContent = tab.channel.url;
      renderTabs();
      updateStatus(`Ready. ${tab.channel.name} is selected.`);
    }

    function createTab(channel) {
      tabCounter += 1;
      const tab = {
        id: `sports-tab-${tabCounter}`,
        label: `Tab ${tabCounter}: ${channel.name}`,
        channel
      };
      playerTabs.push(tab);
      activateTab(tab.id);
    }

    function loadSelectedChannelInPlayer() {
      if (!selectedChannel) {
        updateStatus("Select a channel first.", true);
        return;
      }
      watchHint.classList.add("hidden");
      streamFrame.src = toEmbedProxyUrl(selectedChannel.url);
      updateStatus(`Playing ${selectedChannel.name} inside the player.`);
    }

    function openSelectedChannel() {
      if (!selectedChannel) {
        updateStatus("Select a channel first.", true);
        return;
      }

      const targetWindow = activeTabId || "sports-player-tab";
      const opened = window.open(selectedChannel.url, targetWindow, "noopener");
      if (!opened) {
        updateStatus("Popup blocker blocked launch. Allow popups and try again.", true);
        return;
      }
      updateStatus(`Opened ${selectedChannel.name} in Chromium tab ${targetWindow}.`);
    }

    function selectChannel(index) {
      const selected = channels[index];
      selectedChannel = selected;

      document.querySelectorAll(".channel-btn").forEach((btn, i) => {
        btn.classList.toggle("active", i === index);
      });

      if (activeTabId) {
        const activeTab = playerTabs.find((tab) => tab.id === activeTabId);
        if (activeTab) {
          activeTab.channel = selected;
          activeTab.label = activeTab.label.replace(/:.*$/, `: ${selected.name}`);
        }
        activateTab(activeTabId);
      } else {
        createTab(selected);
      }

      loadSelectedChannelInPlayer();
    }

    channels.forEach((channel, index) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "channel-btn";
      btn.textContent = channel.name;
      btn.addEventListener("click", () => selectChannel(index));
      list.appendChild(btn);
    });

    streamFrame.addEventListener("load", () => {
      if (!selectedChannel) return;
      updateStatus(`Player loaded ${selectedChannel.name}.`);
    });

    watchInPlayer.addEventListener("click", loadSelectedChannelInPlayer);
    openPlayer.addEventListener("click", openSelectedChannel);
    reloadPlayer.addEventListener("click", loadSelectedChannelInPlayer);
    newTabBtn.addEventListener("click", () => {
      const channel = selectedChannel || channels[0];
      createTab(channel);
      loadSelectedChannelInPlayer();
      updateStatus(`Created ${channel.name} tab and loaded it in the player.`);
    });

    if (!isChromium) {
      engineBadge.textContent = "Chromium not detected - player still available";
      engineBadge.style.borderColor = "rgba(245,158,11,0.5)";
      engineBadge.style.background = "rgba(245,158,11,0.2)";
      engineBadge.style.color = "#fcd34d";
    } else {
      engineBadge.textContent = "Chromium detected - player ready";
    }

    selectChannel(0);
  </script>
</body>
</html>
