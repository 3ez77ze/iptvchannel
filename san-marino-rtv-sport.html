<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RTV Sport</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
    #player-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    #player-container video { width: 100%; height: 100%; border: none; background: #000; }
    #offline-message {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #ccc;
      text-align: center;
      padding: 20px;
    }
    #offline-message .icon { font-size: 64px; margin-bottom: 20px; opacity: 0.6; }
    #offline-message h2 { font-size: 24px; color: #fff; margin-bottom: 10px; }
    #offline-message p { font-size: 16px; color: #999; }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #ccc;
    }
    #loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333; border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="player-container">
    <div id="loading">
      <div class="spinner"></div>
      <p>Checking RTV Sport stream...</p>
    </div>
    <div id="offline-message">
      <div class="icon">📡</div>
      <h2>Its offline, maybe comeback later.</h2>
      <p>RTV Sport is not currently broadcasting live.</p>
    </div>
  </div>

  <script>
    function showOffline() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('offline-message').style.display = 'flex';
    }

    function renderHls(url) {
      var container = document.getElementById('player-container');
      var video = document.createElement('video');
      video.controls = true;
      video.autoplay = true;
      video.muted = true;
      video.playsInline = true;
      container.appendChild(video);

      if (window.Hls && Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.ERROR, function(event, data) {
          if (data.fatal) showOffline();
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
      } else {
        showOffline();
      }
    }

    async function checkLiveStream() {
      var loading = document.getElementById('loading');

      try {
        var resp = await fetch('/.netlify/functions/san-marino-rtv-sport');
        var data = await resp.json();

        loading.style.display = 'none';

        if (!data.live || !data.url) {
          showOffline();
          return;
        }

        renderHls(data.url);
      } catch (err) {
        showOffline();
      }
    }

    checkLiveStream();
  </script>
</body>
</html>
