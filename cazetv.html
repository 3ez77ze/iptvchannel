<head>

  <title>CazeTV - cookiestv</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #09090f;
      color: #eeeef2;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

    iframe {
      width: min(100%, 960px);
      aspect-ratio: 16 / 9;
      height: auto;
      min-height: 220px;
      background: #000;
      border-radius: 12px;
      border: none;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>
